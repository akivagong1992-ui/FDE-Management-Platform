# 离线部署 compose — 配合 manpower-images.tar.gz 使用
#
# 目标机器步骤：
#   1. 把 manpower-images.tar.gz 和本文件传到目标机器
#   2. gunzip -c manpower-images.tar.gz | docker load
#   3. docker compose -f docker-compose.offline.yml up -d
#
# 访问：
#   - http://<目标机器 IP>:5173   管理后台 (admin/admin123)
#   - http://<目标机器 IP>:5174   驾驶舱
#   - http://<目标机器 IP>:8000   后端 API

services:
  postgres:
    image: postgres:16-alpine
    container_name: manpower-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: manpower
      POSTGRES_PASSWORD: manpower
      POSTGRES_DB: manpower
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manpower"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: manpower-management-platform-backend:latest
    container_name: manpower-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://manpower:manpower@postgres:5432/manpower
      JWT_SECRET: change-me-in-prod
      FIELD_ENCRYPTION_KEY: change-me-32bytes-encryption-key-padding
      UPLOAD_DIR: /app/uploads
      COCKPIT_ALLOWED_IPS: 127.0.0.1,::1
      COCKPIT_TOKEN: cockpit-dev-token
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: admin123
      CORS_ORIGINS: "*"
      DEBUG: "false"
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
    command: >
      sh -c "
        if [ ! -f /app/uploads/.seeded ]; then
          echo '🌱 first start — seeding demo data...' &&
          python /app/scripts/seed_demo.py &&
          alembic stamp head &&
          touch /app/uploads/.seeded ;
        else
          echo '✓ already seeded — running alembic upgrade head' &&
          alembic upgrade head ;
        fi &&
        echo '🚀 starting uvicorn...' &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  admin-web:
    image: manpower-management-platform-admin-web:latest
    container_name: manpower-admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  cockpit-screen:
    image: manpower-management-platform-cockpit-screen:latest
    container_name: manpower-cockpit
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  pg_data:
  backend_uploads:
