services:
  postgres:
    image: postgres:16-alpine
    container_name: manpower-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: manpower
      POSTGRES_PASSWORD: manpower
      POSTGRES_DB: manpower
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: manpower-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: manpower-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgresql+asyncpg://manpower:manpower@postgres:5432/manpower
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me-in-prod
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: http://localhost:5173,http://localhost:5174
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
