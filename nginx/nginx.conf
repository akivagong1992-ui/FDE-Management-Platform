user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 50m;     # 文件上传上限（与 backend UPLOAD_MAX_MB 对齐）
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';
  access_log /var/log/nginx/access.log main;

  # HTTP → HTTPS 强转
  server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # HTTPS 主入口
  server {
    listen 443 ssl http2;
    server_name your-domain.com;   # ← 改成实际域名

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # ───── 管理后台 ─────
    location /admin/ {
      alias /usr/share/nginx/html/admin/;
      try_files $uri $uri/ /admin/index.html;
    }

    # ───── 驾驶舱（建议加 IP 白名单 / 集团 VPN 限制） ─────
    location /cockpit/ {
      # allow 10.0.0.0/8;   # 取消注释只允许内网
      # deny all;
      alias /usr/share/nginx/html/cockpit/;
      try_files $uri $uri/ /cockpit/index.html;
    }

    # ───── 后端 API ─────
    location /api/ {
      proxy_pass http://backend:8000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 60s;
      proxy_connect_timeout 5s;
    }

    # ───── 健康检查 ─────
    location = /health {
      proxy_pass http://backend:8000/health;
      access_log off;
    }

    # 根路径默认跳管理后台
    location = / { return 302 /admin/; }
  }
}
